# PSM-NAME: wg-easy
# PSM-LABEL: wg-easy — WireGuard VPN 管理面板
# PSM-PORT: 51821
# PSM-HANDLER: wg_easy
services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    restart: unless-stopped
    environment:
      - LANG=zh
      - WG_HOST=__HOST__
      - PASSWORD_HASH=__HASH__
      - WG_DEFAULT_DNS=1.1.1.1,8.8.8.8
    ports:
      - "51820:51820/udp"
      - "__BIND__:__PORT__:51821"
    volumes:
      - wg_easy_data:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
volumes:
  wg_easy_data:
