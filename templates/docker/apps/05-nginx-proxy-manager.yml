# PSM-NAME: nginx-proxy-manager
# PSM-LABEL: Nginx Proxy Mgr — 带 UI 的反向代理管理
# PSM-PORT: 81
# PSM-WARN: Nginx Proxy Manager 需占用 80/443 端口，会与系统 Nginx 产生冲突，请先停止 Nginx
services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "__BIND__:__PORT__:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
volumes:
  npm_data:
  npm_letsencrypt:
